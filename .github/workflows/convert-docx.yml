name: Convert DOCX to Markdown

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  convert:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert DOCX files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p output
          for f in input/*.docx; do
            base="$(basename "$f" .docx)"
            outdir="output/$base"
            mkdir -p "$outdir"
            pandoc -t gfm --extract-media "$outdir/media" "$f" -o "$outdir/$base.md"
          done

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-and-media
          path: output

      - name: Commit outputs to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add converted Markdown and media"
          file_pattern: output
